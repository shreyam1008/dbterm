ShortDescription: Keyboard-first terminal database client for PostgreSQL, MySQL, SQLite, Turso, and D1
Description: |-
  dbterm is a keyboard-first terminal SQL client. Like DBeaver or DataGrip
  but for the terminal. Supports PostgreSQL, MySQL, SQLite, Turso/LibSQL,
  and Cloudflare D1. Features include a query editor with results paging,
  schema and table browsing, service controls, backup, and import helpers.
  Single static binary, low memory, works over SSH.
